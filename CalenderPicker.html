<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
    th { background: #f0f0f0; }
    button { margin-top: 10px; padding: 8px 16px; }
  </style>
</head>

<body>

<script>
  // biến từ Apps Script
  const ROW = <?= row ?>;
  const COL = <?= col ?>;
  const CURRENT = `<?= currentValue ?>`;   // giá trị hiện tại trong ô
</script>

<h3>Chọn giờ học</h3>

<table>
  <tr>
    <th>Khung giờ</th>
    <th>T2</th><th>T3</th><th>T4</th>
    <th>T5</th><th>T6</th><th>T7</th><th>CN</th>
  </tr>

  <script>
    const HOURS = ["8h","9h30","13h","14h30","16h", "17h30", "19h"];
    const DAYS  = ["T2","T3","T4","T5","T6","T7","CN"];

    document.write(
      HOURS.map(h =>
        `<tr><td>${h}</td>` +
        DAYS.map(d => {
          const key = d + " " + h;
          const checked = CURRENT.includes(key) ? "checked" : "";
          return `<td><input type='checkbox' ${checked} data-day='${d}' data-hour='${h}'></td>`;
        }).join("") +
        `</tr>`
      ).join("")
    );
  </script>

</table>

<button onclick="save()">Lưu</button>

<script>
function save() {
  const selected = [];
  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(cb => selected.push(cb.dataset.day + " " + cb.dataset.hour));

  const output = selected.join("\n");

  google.script.run
    .withSuccessHandler(() => google.script.host.close()) // Đóng popup ngay khi xong
    .saveToCellAndUpdateTKB(ROW, COL, output);
}
</script>



</body>
</html>
